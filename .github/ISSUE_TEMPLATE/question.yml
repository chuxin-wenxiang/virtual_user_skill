name: ❓ Question
description: Ask about usage, design, or roadmap
labels: [question]
body:
  - type: textarea
    id: question
    attributes:
      label: What's your question?
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What have you already tried?
      description: Helps us point you to existing docs or issues faster.
